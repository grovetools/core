# Ayu (dark).
# Derived from ayu-theme/ayu-colors themes/dark.yaml: bg = editor.bg
# (surface.lift), bg_dark = surface.base, comment = ui.fg (the stepped
# $palette.gray.l4 token cannot be resolved without the designer's OKLCH
# pipeline), border = ui.line, bg_highlight = editor.line, bg_visual =
# editor.selection.active (25% alpha) composited over bg. magenta maps
# ayu's "pink", cyan maps ayu's "teal" (terminal cyan derives from it).
# SPDX-License-Identifier: MIT

[meta]
name = "ayu-dark"
family = "ayu"
variant = "dark"
appearance = "dark"
default = true
upstream = "https://github.com/ayu-theme/ayu-colors"
author = "Ike Ku (dempfi)"
license = "MIT"

[palette]
bg = "#10141c"
bg_dark = "#0d1017"
bg_highlight = "#161a24"
bg_visual = "#193155"
fg = "#bfbdb6"
comment = "#5a6378"
border = "#1b1f29"
red = "#f07178"
green = "#aad94c"
yellow = "#ffb454"
blue = "#59c2ff"
magenta = "#f29668"
cyan = "#95e6cb"
orange = "#ff8f40"
purple = "#d2a6ff"

[palette.git]
add = "#70bf56"
change = "#73b8ff"
delete = "#f26d78"

[palette.diagnostics]
error = "#d95757"

[terminal]
black = "#0a0000"
white = "#ffffff"
black_bright = "#0a0000"
white_bright = "#ffffff"
