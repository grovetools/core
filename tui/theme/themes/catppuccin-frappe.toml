# Catppuccin Frappé — grove palette.
# Derived from catppuccin/palette palette.json (flavor "frappe": colors + ansiColors).
# Role mapping: bg=base, bg_dark=mantle, bg_highlight=surface0, bg_visual=surface1,
# fg=text, fg_dark=subtext1, fg_gutter=surface1, comment=overlay0, border=surface1,
# magenta=pink, cyan=teal, orange=peach, purple=mauve (per catppuccin style guide).
# Diagnostics per catppuccin style guide: error=red, warning=yellow, info=sky, hint=teal.
# SPDX-License-Identifier: MIT

[meta]
name = "catppuccin-frappe"
family = "catppuccin"
variant = "frappe"
appearance = "dark"
upstream = "https://github.com/catppuccin/palette"
author = "Catppuccin Org"
license = "MIT"

[palette]
bg = "#303446"
bg_dark = "#292c3c"
bg_highlight = "#414559"
bg_visual = "#51576d"
fg = "#c6d0f5"
fg_dark = "#b5bfe2"
fg_gutter = "#51576d"
comment = "#737994"
border = "#51576d"
red = "#e78284"
green = "#a6d189"
yellow = "#e5c890"
blue = "#8caaee"
magenta = "#f4b8e4"
cyan = "#81c8be"
orange = "#ef9f76"
purple = "#ca9ee6"

[palette.diagnostics]
error = "#e78284"
warning = "#e5c890"
info = "#99d1db"
hint = "#81c8be"

[terminal]
black = "#51576d"
red = "#e78284"
green = "#a6d189"
yellow = "#e5c890"
blue = "#8caaee"
magenta = "#f4b8e4"
cyan = "#81c8be"
white = "#a5adce"
black_bright = "#626880"
red_bright = "#e67172"
green_bright = "#8ec772"
yellow_bright = "#d9ba73"
blue_bright = "#7b9ef0"
magenta_bright = "#f2a4db"
cyan_bright = "#5abfb5"
white_bright = "#b5bfe2"
