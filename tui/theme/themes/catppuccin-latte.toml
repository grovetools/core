# Catppuccin Latte — grove palette.
# Derived from catppuccin/palette palette.json (flavor "latte": colors + ansiColors).
# Role mapping: bg=base, bg_dark=mantle, bg_highlight=surface0, bg_visual=surface1,
# fg=text, fg_dark=subtext1, fg_gutter=surface1, comment=overlay0, border=surface1,
# magenta=pink, cyan=teal, orange=peach, purple=mauve (per catppuccin style guide).
# Diagnostics per catppuccin style guide: error=red, warning=yellow, info=sky, hint=teal.
# SPDX-License-Identifier: MIT

[meta]
name = "catppuccin-latte"
family = "catppuccin"
variant = "latte"
appearance = "light"
default = true
upstream = "https://github.com/catppuccin/palette"
author = "Catppuccin Org"
license = "MIT"

[palette]
bg = "#eff1f5"
bg_dark = "#e6e9ef"
bg_highlight = "#ccd0da"
bg_visual = "#bcc0cc"
fg = "#4c4f69"
fg_dark = "#5c5f77"
fg_gutter = "#bcc0cc"
comment = "#9ca0b0"
border = "#bcc0cc"
red = "#d20f39"
green = "#40a02b"
yellow = "#df8e1d"
blue = "#1e66f5"
magenta = "#ea76cb"
cyan = "#179299"
orange = "#fe640b"
purple = "#8839ef"

[palette.diagnostics]
error = "#d20f39"
warning = "#df8e1d"
info = "#04a5e5"
hint = "#179299"

[terminal]
black = "#5c5f77"
red = "#d20f39"
green = "#40a02b"
yellow = "#df8e1d"
blue = "#1e66f5"
magenta = "#ea76cb"
cyan = "#179299"
white = "#acb0be"
black_bright = "#6c6f85"
red_bright = "#de293e"
green_bright = "#49af3d"
yellow_bright = "#eea02d"
blue_bright = "#456eff"
magenta_bright = "#fe85d8"
cyan_bright = "#2d9fa8"
white_bright = "#bcc0cc"
