# Everforest (dark, hard) — g:everforest_background = "hard".
# Derived from sainnhe/everforest autoload/everforest.vim (palette function,
# background "hard" + dark) and colors/everforest.vim role usage.
# The hardness axis changes only the background ramp (bg_dim..bg5,
# bg_visual); fg/grey/accent colors are shared across the dark variants.
# Role mapping: see everforest-dark.toml.
# SPDX-License-Identifier: MIT

[meta]
name = "everforest-dark-hard"
family = "everforest"
variant = "dark-hard"
appearance = "dark"
upstream = "https://github.com/sainnhe/everforest"
author = "Sainnhe Park"
license = "MIT"

[palette]
bg = "#272e33"
bg_dark = "#1e2326"
bg_highlight = "#2e383c"
bg_visual = "#4c3743"
fg = "#d3c6aa"
fg_dark = "#9da9a0"
fg_gutter = "#4f5b58"
comment = "#859289"
border = "#495156"
red = "#e67e80"
green = "#a7c080"
yellow = "#dbbc7f"
blue = "#7fbbb3"
magenta = "#d699b6"
cyan = "#83c092"
orange = "#e69875"
purple = "#d699b6"

[palette.diagnostics]
error = "#e67e80"
warning = "#dbbc7f"
info = "#7fbbb3"
hint = "#d699b6"

[terminal]
black = "#414b50"
red = "#e67e80"
green = "#a7c080"
yellow = "#dbbc7f"
blue = "#7fbbb3"
magenta = "#d699b6"
cyan = "#83c092"
white = "#d3c6aa"
black_bright = "#414b50"
red_bright = "#e67e80"
green_bright = "#a7c080"
yellow_bright = "#dbbc7f"
blue_bright = "#7fbbb3"
magenta_bright = "#d699b6"
cyan_bright = "#83c092"
white_bright = "#d3c6aa"
