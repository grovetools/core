# Everforest (light, hard) — g:everforest_background = "hard".
# Derived from sainnhe/everforest autoload/everforest.vim (palette function,
# background "hard" + light) and colors/everforest.vim role usage.
# The hardness axis changes only the background ramp (bg_dim..bg5,
# bg_visual); fg/grey/accent colors are shared across the light variants.
# Role mapping: see everforest-light.toml.
# SPDX-License-Identifier: MIT

[meta]
name = "everforest-light-hard"
family = "everforest"
variant = "light-hard"
appearance = "light"
upstream = "https://github.com/sainnhe/everforest"
author = "Sainnhe Park"
license = "MIT"

[palette]
bg = "#fffbef"
bg_dark = "#f2efdf"
bg_highlight = "#f8f5e4"
bg_visual = "#f0f2d4"
fg = "#5c6a72"
fg_dark = "#829181"
fg_gutter = "#bec5b2"
comment = "#939f91"
border = "#e8e5d5"
red = "#f85552"
green = "#8da101"
yellow = "#dfa000"
blue = "#3a94c5"
magenta = "#df69ba"
cyan = "#35a77c"
orange = "#f57d26"
purple = "#df69ba"

[palette.diagnostics]
error = "#f85552"
warning = "#dfa000"
info = "#3a94c5"
hint = "#df69ba"

[terminal]
black = "#5c6a72"
red = "#f85552"
green = "#8da101"
yellow = "#dfa000"
blue = "#3a94c5"
magenta = "#df69ba"
cyan = "#35a77c"
white = "#edeada"
black_bright = "#5c6a72"
red_bright = "#f85552"
green_bright = "#8da101"
yellow_bright = "#dfa000"
blue_bright = "#3a94c5"
magenta_bright = "#df69ba"
cyan_bright = "#35a77c"
white_bright = "#edeada"
