# GitHub Light — grove palette for the "github" family.
# Derived from GitHub Primer primitives (primer/primitives) design tokens:
#   src/tokens/base/color/light/light.json5
#   src/tokens/functional/color/fgColor.json5 / bgColor.json5 / borderColor.json5
# Functional tokens resolved for theme "light" (overrides[theme] ?? overrides[light] ?? $value).
# Mapping: bg=bgColor-default, bg_dark=bgColor-inset, bg_highlight=bgColor-muted,
#   fg=fgColor-default, comment=fgColor-muted, fg_inverse=fgColor-onEmphasis,
#   border=borderColor-default, blue=fgColor-accent, green=fgColor-success,
#   yellow=fgColor-attention, orange=fgColor-severe, red=fgColor-danger,
#   purple=fgColor-done, magenta=fgColor-sponsors.
# cyan: current primitives has no cyan scale; substituted base.color.blue.6 (#0550ae),
#   one step darker than fgColor-accent (base.color.blue.5) to stay distinct from blue.
# bg_visual omitted: bgColor-accent-muted is alpha-translucent in this token set.
# SPDX-License-Identifier: MIT

[meta]
name = "github-light"
family = "github"
variant = "light"
appearance = "light"
default = true
upstream = "https://github.com/primer/primitives"
author = "GitHub, Inc. (Primer)"
license = "MIT"

[palette]
bg = "#ffffff"
bg_dark = "#f6f8fa"
bg_highlight = "#f6f8fa"
fg = "#1f2328"
fg_inverse = "#ffffff"
comment = "#59636e"
border = "#d1d9e0"
red = "#d1242f"
green = "#1a7f37"
yellow = "#9a6700"
blue = "#0969da"
magenta = "#bf3989"
cyan = "#0550ae"
orange = "#bc4c00"
purple = "#8250df"

[palette.git]
add = "#1a7f37"
change = "#9a6700"
delete = "#d1242f"

[palette.diagnostics]
error = "#d1242f"
warning = "#9a6700"
info = "#0969da"
