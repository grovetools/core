# Nord (dark) — grove palette.
# Derived from nordtheme/nord src/nord.scss (nord0..nord15).
# Role mapping: bg=nord0, bg_dark=nord1 (nord defines nothing darker than nord0),
# bg_highlight=nord1, bg_visual=nord2, fg=nord4, fg_gutter=nord3, border=nord3,
# red=nord11, green=nord14, yellow=nord13, blue=nord9, cyan=nord8, orange=nord12.
# comment=#616e88: brightened nord3 used by official nord editor ports for comment
# text, since raw nord3 is only ~1.7:1 against nord0.
# magenta=purple=nord15: nord has a single purple slot, so the value is duplicated.
# git per nord diff spec; terminal per the official nord terminal spec.
# SPDX-License-Identifier: MIT

[meta]
name = "nord-dark"
family = "nord"
variant = "dark"
appearance = "dark"
default = true
upstream = "https://github.com/nordtheme/nord"
author = "Sven Greb"
license = "MIT"

[palette]
bg = "#2e3440"
bg_dark = "#3b4252"
bg_highlight = "#3b4252"
bg_visual = "#434c5e"
fg = "#d8dee9"
fg_gutter = "#4c566a"
comment = "#616e88"
border = "#4c566a"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#81a1c1"
magenta = "#b48ead"
cyan = "#88c0d0"
orange = "#d08770"
purple = "#b48ead"

[palette.git]
add = "#a3be8c"
change = "#ebcb8b"
delete = "#bf616a"

[palette.diagnostics]
error = "#bf616a"
warning = "#ebcb8b"
info = "#88c0d0"
hint = "#5e81ac"

[terminal]
black = "#3b4252"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#81a1c1"
magenta = "#b48ead"
cyan = "#88c0d0"
white = "#e5e9f0"
black_bright = "#4c566a"
red_bright = "#bf616a"
green_bright = "#a3be8c"
yellow_bright = "#ebcb8b"
blue_bright = "#81a1c1"
magenta_bright = "#b48ead"
cyan_bright = "#8fbcbb"
white_bright = "#eceff4"
