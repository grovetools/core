# Tokyo Night (day) — the tokyonight light style.
# Upstream generates this palette at runtime (lua/tokyonight/colors/day.lua:
# HSLuv-invert of the night palette at day_brightness = 0.3). Values below
# were produced with that exact algorithm and verified against the compiled
# extras/vim/colors/tokyonight-day.vim highlight groups.
# border is upstream's day border (bg blended 80% toward black), which is
# visible on the light background.
# SPDX-License-Identifier: Apache-2.0

[meta]
name = "tokyonight-day"
family = "tokyonight"
variant = "day"
appearance = "light"
default = true
upstream = "https://github.com/folke/tokyonight.nvim"
author = "Folke Lemaitre"
license = "Apache-2.0"

[palette]
bg = "#e1e2e7"
bg_dark = "#d0d5e3"
bg_highlight = "#c4c8da"
bg_visual = "#b7c1e3"
fg = "#3760bf"
fg_dark = "#6172b0"
fg_gutter = "#a8aecb"
comment = "#848cb5"
border = "#b4b5b9"
red = "#f52a65"
green = "#587539"
yellow = "#8c6c3e"
blue = "#2e7de9"
magenta = "#9854f1"
cyan = "#007197"
orange = "#b15c00"
purple = "#7847bd"

[palette.git]
add = "#4197a4"
change = "#506d9c"
delete = "#c47981"

[palette.diagnostics]
error = "#c64343"
warning = "#8c6c3e"
info = "#07879d"
hint = "#118c74"

[terminal]
black = "#b4b5b9"
black_bright = "#a1a6c5"
white = "#6172b0"
white_bright = "#3760bf"
